<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Uploader Web Pro</title>
    <!-- 💡 FastAPI Static එකෙන් CSS එක නිවැරදිව ලෝඩ් වෙන්න සෙට් කරපු ලින්ක් එක -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h2>🚀 YT Uploader Web Pro</h2>
        <p class="subtitle">Direct Link එකෙන් බාලා, YouTube එකට Upload කරලා, Server එකෙන් Auto-Delete කරමු!</p>
        
        <hr>

        <!-- 📥 1 වෙනි පියවර: වීඩියෝව බාගත කිරීම -->
        <div class="section" id="download-section">
            <h3>📥 Step 1: Download Video to Server</h3>
            <div class="input-group">
                <label for="video-url">Video Direct URL (වීඩියෝ ලින්ක් එක):</label>
                <input type="text" id="video-url" placeholder="https://example.com/video.mp4">
            </div>
            
            <div class="input-group">
                <label for="custom-name">Save Video As (කැමති නම):</label>
                <!-- උඹ ඉල්ලපු Custom Name දාන තැන -->
                <input type="text" id="custom-name" placeholder="உදා: walking 1-1">
            </div>
            
            <button id="btn-download" onclick="downloadVideo()">Download to Server</button>
            <div class="status-msg" id="download-status"></div>
        </div>

        <hr>

        <!-- 📤 2 වෙනි පියවර: YouTube යැවීම සහ ඔටෝ ඩිලීට් කිරීම -->
        <div class="section id="upload-section">
            <h3>📤 Step 2: Push to YouTube & Cut from Server</h3>
            
            <button id="btn-get-auth" onclick="getAuthUrl()">🔑 Link YouTube Account</button>
            <div id="auth-url-container" style="display:none; margin-top: 10px;">
                <p>පහත ලින්ක් එකෙන් ගොස් ලොග් වී ලැබෙන Code එක කොපි කරගෙන එන්න:</p>
                <a id="auth-link" href="#" target="_blank">Google Login Link</a>
            </div>

            <div class="input-group" style="margin-top: 15px;">
                <label for="auth-code">Google Auth Code:</label>
                <input type="text" id="auth-code" placeholder="මෙතනට Code එක පේස්ට් කරන්න">
            </div>

            <div class="input-group">
                <label for="yt-title">YouTube Video Title:</label>
                <input type="text" id="yt-title" placeholder="වීඩියෝ එකේ Title එක">
            </div>

            <div class="input-group">
                <label for="yt-desc">YouTube Description:</label>
                <textarea id="yt-desc" rows="3" placeholder="වීඩියෝ විස්තරය..."></textarea>
            </div>

            <!-- 🔥 උඹ ඉල්ලපු වැදගත්ම බටන් එක: Upload වුණු ගමන් සර්වර් එකෙන් Cut වෙනවා -->
            <button id="btn-upload" onclick="uploadAndCutVideo()">🚀 Upload & Cut to YT</button>
            <div class="status-msg" id="upload-status"></div>
        </div>
    </div>

    <!-- 💡 FastAPI Static එකෙන් JS එක නිවැරදිව ලෝඩ් වෙන්න සෙට් කරපු ලින්ක් එක -->
    <script src="/static/app.js"></script>
</body>
</html>
