<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Video Downloader & YouTube Uploader</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #f8fafc; max-width: 800px; margin: 40px auto; padding: 20px; }
        .card { background: #1e293b; border-radius: 12px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 24px; }
        h1, h2 { margin-top: 0; color: #38bdf8; }
        label { font-weight: bold; color: #94a3b8; display: block; margin-top: 10px; }
        input, textarea, select, button { width: 100%; padding: 12px; margin: 8px 0 15px 0; border-radius: 6px; border: none; font-size: 16px; box-sizing: border-box; }
        input, textarea, select { background: #334155; color: white; border: 1px solid #475569; }
        button { background: #0284c7; color: white; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #0369a1; }
        .btn-upload { background: #10b981; }
        .btn-upload:hover { background: #059669; }
        .btn-refresh { background: #475569; width: auto; margin: 0; padding: 8px 15px; font-size: 14px; }
        .btn-refresh:hover { background: #64748b; }
        .loading { display: none; color: #f59e0b; font-weight: bold; text-align: center; margin: 10px 0; }
        
        /* Inline Status Messages */
        .status-box { display: none; padding: 12px; border-radius: 6px; margin: 10px 0; font-weight: bold; }
        .status-success { display: block; background: #064e3b; color: #34d399; border: 1px solid #059669; }
        .status-error { display: block; background: #4c1d1d; color: #f87171; border: 1px solid #dc2626; text-align: left; white-space: pre-wrap; font-family: monospace; font-size: 13px; }
    </style>
</head>
<body>

    <!-- පළමු පියවර: වීඩියෝ එක සර්වර් එකට බාගැනීම -->
    <div class="card">
        <h1>📥 1. Direct Link එකෙන් Cloud එකට බාන්න</h1>
        <p>ලින්ක් එක සහ සේව් වෙන්න ඕන නම දීලා වීඩියෝ එක Cloud එකට ගන්න.</p>
        
        <form id="downloadForm">
            <label for="videoUrl">Direct Video URL:</label>
            <input type="url" id="videoUrl" placeholder="https://example.com/video.mp4" required>
            
            <label for="customName">Save As (වීඩියෝ එක සේව් වෙන්න ඕන නම - Optional):</label>
            <input type="text" id="customName" placeholder="my_favorite_video.mp4">
            
            <button type="submit">වීඩියෝ එක Cloud එකට බාන්න</button>
        </form>
        
        <div id="downloadLoading" class="loading">⏳ වීඩියෝ එක බාමින් පවතී... කරුණාකර රැඳී සිටින්න...</div>
        <!-- මෙතන තමයි Alert එක වෙනුවට සාර්ථක වුණු මැසේජ් එක පෙන්නන්නේ -->
        <div id="downloadStatus" class="status-box"></div>
    </div>

    <!-- දෙවන පියවර: බාපු වීඩියෝ ලිස්ට් එක සහ YouTube එකට අප්ලෝඩ් කිරීම -->
    <div class="card">
        <h1>🚀 2. බාපු වීඩියෝ YouTube එකට අප්ලෝඩ් කරන්න</h1>
        <p>සිලෙක්ට් කරලා YouTube එකට තල්ලු කරන්න.</p>
        
        <form id="uploadForm">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                <label style="margin: 0;">Select Video from Cloud:</label>
                <button type="button" class="btn-refresh" onclick="refreshVideoList()">🔄 Refresh List</button>
            </div>
            <select id="videoSelect" required>
                <option value="">-- වීඩියෝවක් තෝරන්න --</option>
            </select>
            
            <label for="videoTitle">YouTube Title:</label>
            <input type="text" id="videoTitle" placeholder="වීඩියෝ මාතෘකාව" required>
            
            <label for="videoDesc">YouTube Description:</label>
            <textarea id="videoDesc" placeholder="වීඩියෝ විස්තරය" rows="4" required></textarea>
            
            <button type="submit" class="btn-upload">YouTube වෙත අප්ලෝඩ් කරන්න</button>
        </form>
        
        <div id="uploadLoading" class="loading">⏳ YouTube වෙත අප්ලෝඩ් වෙමින් පවතී... කරුණාකර රැඳී සිටින්න...</div>
        <!-- YouTube එකේ වැරදි ට්‍රැක් කරන කොටස -->
        <div id="uploadStatus" class="status-box"></div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        // 1. Dropdown එක Refresh කරන Function එක
        async function refreshVideoList() {
            const select = document.getElementById("videoSelect");
            select.innerHTML = '<option value="">⏳ පූරණය වෙමින් පවතී...</option>';
            
            try {
                const response = await fetch(`${API_BASE}/list-videos`);
                const videos = await response.json();
                
                select.innerHTML = '<option value="">-- වීඩියෝවක් තෝරන්න --</option>';
                
                if (videos.length === 0) {
                    select.innerHTML = '<option value="">-- Cloud එකේ දැනට වීඩියෝ නැත --</option>';
                    return;
                }
                
                videos.forEach(vid => {
                    const opt = document.createElement("option");
                    opt.value = vid.path;
                    opt.textContent = `${vid.name} (${vid.size})`;
                    select.appendChild(opt);
                });
            } catch (err) {
                select.innerHTML = '<option value="">❌ ලිස්ට් එක ගන්න බැරි වුණා!</option>';
            }
        }

        // 2. වීඩියෝ එක බාන Form එක
        document.getElementById("downloadForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const url = document.getElementById("videoUrl").value;
            const customName = document.getElementById("customName").value;
            const loading = document.getElementById("downloadLoading");
            const statusBox = document.getElementById("downloadStatus");
            
            loading.style.display = "block";
            statusBox.style.display = "none";
            statusBox.className = "status-box";
            
            try {
                const formData = new FormData();
                formData.append("url", url);
                formData.append("custom_name", customName);

                const response = await fetch(`${API_BASE}/download`, {
                    method: "POST",
                    body: formData
                });
                const data = await response.json();
                
                if (response.ok) {
                    statusBox.textContent = `✓ ${data.message}`;
                    statusBox.classList.add("status-success");
                    document.getElementById("videoUrl").value = "";
                    document.getElementById("customName").value = "";
                    refreshVideoList(); // Dropdown එකත් එවලේම අප්ඩේට් කරනවා
                } else {
                    statusBox.textContent = `❌ වැරැද්දක් වුණා: ${data.detail || "බාගැනීම අසාර්ථකයි"}`;
                    statusBox.classList.add("status-error");
                }
            } catch (err) {
                statusBox.textContent = "❌ සර්වර් එක කනෙක්ට් කරගන්න බැරි වුණා!";
                statusBox.classList.add("status-error");
            } finally {
                loading.style.display = "none";
            }
        });

        // 3. YouTube Upload Form එක (සවිස්තරාත්මක Error Reporting සමඟ)
        document.getElementById("uploadForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const filePath = document.getElementById("videoSelect").value;
            const title = document.getElementById("videoTitle").value;
            const description = document.getElementById("videoDesc").value;
            const loading = document.getElementById("uploadLoading");
            const statusBox = document.getElementById("uploadStatus");
            
            if (!filePath) {
                alert("කරුණාකර මුලින්ම වීඩියෝ එකක් තෝරන්න!");
                return;
            }
            
            loading.style.display = "block";
            statusBox.style.display = "none";
            statusBox.className = "status-box";
            
            try {
                const formData = new FormData();
                formData.append("file_path", filePath);
                formData.append("title", title);
                formData.append("description", description);

                const response = await fetch(`${API_BASE}/upload`, {
                    method: "POST",
                    body: formData
                });
                const data = await response.json();
                
                if (response.ok) {
                    statusBox.textContent = `🎉 ${data.message}`;
                    statusBox.classList.add("status-success");
                    document.getElementById("videoTitle").value = "";
                    document.getElementById("videoDesc").value = "";
                    refreshVideoList();
                } else {
                    // API එකෙන් එවන සම්පූර්ණ Error එක මෙතන පෙන්වනවා
                    statusBox.textContent = `❌ YouTube Upload Error:\n${data.detail}`;
                    statusBox.classList.add("status-error");
                }
            } catch (err) {
                statusBox.textContent = "❌ සර්වර් එක සමඟ තිබුණු සම්බන්ධතාවය බිඳ වැටුණා!";
                statusBox.classList.add("status-error");
            } finally {
                loading.style.display = "none";
            }
        });

        // පේජ් එක මුලින්ම ලෝඩ් වෙනකොට ලිස්ට් එක ගන්නවා
        refreshVideoList();
    </script>
</body>
</html>
